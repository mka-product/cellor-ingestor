services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - .env
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      STORAGE_BUCKET: ""
      ENABLE_IN_PROCESS_INGESTION: "false"
      ENABLE_IN_PROCESS_OVERLAY_INGESTION: "false"
      STATIC_DIR: /app/web/dist
    ports:
      - "8000:8000"
    depends_on:
      minio:
        condition: service_healthy

  worker:
    profiles: ["manual"]
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file:
      - .env
    volumes:
      - ./test_dataset:/datasets
      - ./data/artifacts:/artifacts

  daemon:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file:
      - .env
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      STORAGE_BUCKET: ""
      OVERLAY_STAGING_DIR: /data/overlay-staging
      DAEMON_POLL_INTERVAL: "10"
    volumes:
      - ./data/overlay-staging:/data/overlay-staging
    depends_on:
      minio:
        condition: service_healthy
