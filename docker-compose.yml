services:
  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data

  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      /usr/bin/mc mb --ignore-existing local/raw &&
      /usr/bin/mc mb --ignore-existing local/derived &&
      /usr/bin/mc anonymous set public local/derived
      "

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    depends_on:
      - minio
      - minio-init
    environment:
      CATALOG_PATH: /data/catalog/catalog.json
      OVERLAYS_PATH: /data/catalog/overlays.json
      REVIEWS_PATH: /data/catalog/reviews.json
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
    volumes:
      - ./data/catalog:/data/catalog
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      - api
    ports:
      - "8080:80"

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    depends_on:
      - minio
      - minio-init
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
    volumes:
      - ./data/catalog:/data/catalog
      - ./test_dataset:/datasets
      - ./data/artifacts:/artifacts
